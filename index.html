<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SHIFT_V5.7_SECURE</title>
    <style>
        :root {
            --bg: #121214;
            --card: #1c1c1e;
            --border: rgba(255, 255, 255, 0.05);
            --text-dim: #8e8e93;
            --text-main: #f2f2f7;
            --olive: #9fa38a;      
            --terracotta: #b36a5b; 
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; padding: 24px 20px; }

        /* 導航 */
        .nav { display: flex; gap: 20px; margin-bottom: 30px; }
        .nav-btn { background: none; border: none; color: var(--text-dim); font-size: 10px; font-weight: 800; letter-spacing: 0.15em; cursor: pointer; padding: 5px 0; }
        .nav-btn.active { color: var(--text-main); border-bottom: 2px solid var(--olive); }

        .tab-content { display: none; animation: mjFade 0.3s ease; }
        .tab-content.active { display: block; }

        /* 核心看板 */
        .hero-card { background: linear-gradient(145deg, #1e1e20, #161618); border-radius: 28px; padding: 30px 24px; margin-bottom: 24px; position: relative; border: 1px solid var(--border); }
        .hero-label { font-size: 9px; font-weight: 800; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; }
        .hero-title { font-size: 32px; font-weight: 200; margin: 10px 0; }

        /* 任務列表 */
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 5px; border-bottom: 1px solid var(--border); transition: 0.3s; }
        .item-row.just-done { background: rgba(159, 163, 138, 0.1); transform: scale(0.98); }
        .item-name { font-size: 15px; font-weight: 500; }
        .item-sub { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        /* 輸入與按鈕 */
        .input-box { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 24px; border: 1px solid var(--border); }
        input, select, textarea { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text-main); padding: 8px 0; font-size: 14px; width: 100%; outline: none; margin-bottom: 12px; }
        .btn-done { background: var(--olive); color: #121214; border: none; padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 800; cursor: pointer; }
        
        /* Log 樣式 */
        .log-box { font-size: 10px; color: var(--text-dim); font-family: monospace; max-height: 100px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; }

        @keyframes mjFade { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <button class="nav-btn active" onclick="tab('basic', event)">TASKS</button>
        <button class="nav-btn" onclick="tab('bedding', event)">SHEETS</button>
        <button class="nav-btn" onclick="tab('system', event)">DATA</button>
    </div>

    <div id="basic" class="tab-content active">
        <div class="input-box">
            <input type="text" id="bName" placeholder="Task Name...">
            <div style="display:flex; gap:10px;">
                <input type="number" id="bVal" placeholder="Freq" style="flex:1;">
                <select id="bUnit" style="flex:1;">
                    <option value="1">Days</option>
                    <option value="7">Weeks</option>
                </select>
                <button class="btn-done" style="margin-bottom:12px;" onclick="addBasic()">ADD</button>
            </div>
        </div>
        <div id="taskList"></div>
    </div>

    <div id="bedding" class="tab-content">
        <div class="hero-card">
            <div class="hero-label">Recommended</div>
            <div id="nextSheetName" class="hero-title">---</div>
            <div id="currentStatusBar" style="font-size:11px; color:var(--olive);">Active: ---</div>
            <button class="btn-done" style="width:100%; margin-top:20px; padding:15px;" onclick="rotateSheet()">ROTATE & LOG</button>
        </div>
        <div id="sheetInventory"></div>
    </div>

    <div id="system" class="tab-content">
        <div class="input-box">
            <div class="hero-label">Action Log (Security Check)</div>
            <div id="actionLog" class="log-box"></div>
            <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
            <div class="hero-label">Backup Capsule</div>
            <textarea id="backupCode" style="height:60px; font-size:10px; color:var(--accent);" readonly></textarea>
            <button class="btn-done" style="width:100%; background:none; border:1px solid var(--olive); color:var(--olive); margin-top:10px;" onclick="copyBackup()">COPY DATA</button>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('shift_v5_7_data')) || {
        basic: [], sheets: [], sheetIdx: 0, currentSheet: "None", logs: []
    };

    function tab(id, e) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
        render();
    }

    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        data.logs.unshift(`[${time}] ${msg}`);
        if(data.logs.length > 20) data.logs.pop();
    }

    function render() {
        const today = new Date();
        
        // Tasks 渲染
        const listEl = document.getElementById('taskList');
        const sorted = data.basic.map((t, i) => {
            const next = new Date(new Date(t.lastDate).getTime() + t.freq * 86400000);
            return { ...t, next, diff: Math.floor((today - new Date(t.lastDate)) / 86400000), i };
        }).sort((a, b) => a.next - b.next);

        listEl.innerHTML = sorted.map(t => `
            <div class="item-row" id="task-${t.i}">
                <div onclick="editBasic(${t.i})">
                    <div class="item-name">${t.name}</div>
                    <div class="item-sub">${t.diff}d past / T-${Math.ceil((t.next-today)/86400000)}d</div>
                </div>
                <button class="btn-done" onclick="doneBasic(${t.i})">DONE</button>
            </div>
        `).join('');

        // Bedding 渲染 (簡化邏輯)
        const nxt = data.sheets[data.sheetIdx % (data.sheets.length || 1)] || { name: "Empty" };
        document.getElementById('nextSheetName').innerText = nxt.name;
        document.getElementById('currentStatusBar').innerText = `Active: ${data.currentSheet}`;

        // Log 渲染
        document.getElementById('actionLog').innerHTML = data.logs.map(l => `<div>${l}</div>`).join('') || "No actions yet";

        // Sync
        document.getElementById('backupCode').value = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        localStorage.setItem('shift_v5_7_data', JSON.stringify(data));
    }

    function addBasic() {
        const n = document.getElementById('bName').value, v = parseInt(document.getElementById('bVal').value), u = parseInt(document.getElementById('bUnit').value);
        if(n && v) {
            data.basic.push({ name: n, freq: v * u, lastDate: new Date().toISOString() });
            addLog(`Created: ${n}`);
            render();
        }
    }

    function doneBasic(idx) {
        const row = document.getElementById(`task-${idx}`);
        row.classList.add('just-done');
        
        setTimeout(() => {
            addLog(`Completed: ${data.basic[idx].name}`);
            data.basic[idx].lastDate = new Date().toISOString();
            render();
        }, 300);
    }

    function rotateSheet() {
        const nxt = document.getElementById('nextSheetName').innerText;
        addLog(`Sheet Rotated: ${nxt}`);
        data.currentSheet = nxt;
        data.sheetIdx++;
        render();
    }

    function editBasic(idx) {
        const n = prompt("Name:", data.basic[idx].name), f = prompt("Freq (days):", data.basic[idx].freq);
        if(n) { data.basic[idx].name = n; data.basic[idx].freq = parseInt(f); addLog(`Edited: ${n}`); render(); }
    }

    function copyBackup() { document.getElementById("backupCode").select(); document.execCommand("copy"); alert("Data Encrypted & Copied"); }

    render();
</script>
</body>
</html>
