<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SHIFT_V7.1_FIXED</title>
    <style>
        :root {
            --bg: #121214; --card: #1c1c1e; --field: #252528;
            --border: rgba(255, 255, 255, 0.1); --text-dim: #8e8e93;
            --text-main: #f2f2f7; --olive: #9fa38a; --terracotta: #b36a5b; 
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; padding: 24px 20px; padding-bottom: 60px; }
        
        .nav { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .nav-btn { background: none; border: none; color: var(--text-dim); font-size: 11px; font-weight: 800; cursor: pointer; padding: 10px 0; }
        .nav-btn.active { color: var(--olive); border-bottom: 2px solid var(--olive); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .admin-drawer { background: var(--field); border-radius: 20px; padding: 18px; margin-bottom: 24px; border: 1px solid var(--border); }
        .section-title { font-size: 10px; font-weight: 800; color: var(--olive); margin-bottom: 12px; letter-spacing: 0.1em; }
        
        .input-group { display: flex; gap: 10px; align-items: center; }
        input, select { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text-main); padding: 8px 0; font-size: 14px; outline: none; }
        
        .btn-add { background: none; border: 1.5px solid var(--olive); color: var(--olive); padding: 8px 16px; border-radius: 10px; font-size: 10px; font-weight: 800; cursor: pointer; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 5px; border-bottom: 1px solid var(--border); }
        .stats-line { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

        .btn-progress-container {
            position: relative; width: 100px; height: 36px; background: rgba(255,255,255,0.05);
            border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid var(--border);
        }
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; transition: width 0.3s ease; z-index: 1; }
        .btn-label { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; z-index: 2; }

        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-card { background: var(--card); width: 88%; max-width: 340px; padding: 25px; border-radius: 30px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="modalOverlay"><div id="modalContent" class="modal-card"></div></div>

<div class="container">
    <div class="nav">
        <button class="nav-btn active" onclick="tab('basic', event)">TASKS</button>
        <button class="nav-btn" onclick="tab('bedding', event)">BEDDING</button>
        <button class="nav-btn" onclick="tab('system', event)">DATA</button>
    </div>

    <div id="basic" class="tab-content active">
        <div class="admin-drawer">
            <div class="section-title">NEW TASK</div>
            <input type="text" id="bName" placeholder="任務名稱..." style="width:100%; margin-bottom:12px;">
            <div class="input-group">
                <input type="number" id="bVal" placeholder="頻率" style="flex:1;">
                <select id="bUnit" style="flex:1;"><option value="1" selected>天</option><option value="7">週</option></select>
                <button class="btn-add" onclick="addBasic()">ADD</button>
            </div>
        </div>
        <div id="taskList"></div>
    </div>

    <div id="bedding" class="tab-content">
        <div class="admin-drawer" style="background: linear-gradient(145deg, #1e1e20, #161618); text-align:center; position:relative;">
            <div style="position:absolute; top:15px; right:15px; display:flex; align-items:center; gap:5px;">
                <span style="font-size:9px; color:var(--terracotta); font-weight:800;">COOLING</span>
                <input type="checkbox" id="coolMode" onchange="toggleCooling()">
            </div>
            <div class="section-title">RECOMMENDED NEXT</div>
            <div id="nextSheetName" style="font-size: 28px; font-weight: 200; margin: 15px 0;">---</div>
            
            <div id="beddingStats" style="margin-bottom:15px;">
                <div id="currentStatusBar" style="font-size:11px; color:var(--olive); background: rgba(159,163,138,0.1); padding: 4px 10px; border-radius: 6px; display: inline-block;">Current: ---</div>
                <div id="sheetDaysInfo" style="font-size:10px; color:var(--text-dim); margin-top:6px;">已使用：0 天</div>
            </div>

            <button class="btn-add" style="width:100%; padding:15px; background:var(--terracotta); color:white; border:none;" onclick="rotateSheet()">CONFIRM ROTATION</button>
        </div>

        <div class="admin-drawer">
            <div class="section-title">ADD NEW PATTERN</div>
            <div class="input-group">
                <input type="text" id="sName" placeholder="款式名稱..." style="flex:2;">
                <select id="sType" style="flex:1.5;">
                    <option value="all">四季通用</option>
                    <option value="summer">夏季優先</option>
                </select>
                <button class="btn-add" onclick="addSheet()">SAVE</button>
            </div>
        </div>

        <div id="sheetInventory"></div>
    </div>

    <div id="system" class="tab-content">
        <div class="admin-drawer">
            <textarea id="backupCode" rows="3" readonly style="width:100%; border:1px solid var(--border); border-radius:10px; padding:10px; font-size:10px; background:rgba(0,0,0,0.2); color:var(--text-dim); outline:none;"></textarea>
            <button class="btn-add" style="width:100%; margin-top:12px;" onclick="copyBackup()">COPY BACKUP</button>
        </div>
        <div class="admin-drawer">
            <textarea id="importInput" rows="3" placeholder="貼上代碼..." style="width:100%; border:1px solid var(--border); border-radius:10px; padding:10px; font-size:12px; outline:none; color:white;"></textarea>
            <button class="btn-add" style="width:100%; margin-top:12px; border-color:var(--terracotta); color:var(--terracotta);" onclick="importData()">RESTORE DATA</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'shift_v7_1_data';
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { 
        basic: [], 
        sheets: [], 
        sheetIdx: 0, 
        currentSheet: "None", 
        sheetLastDate: new Date().toISOString(),
        coolMode: false 
    };
    let editState = { type: null, idx: null };

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); render(); }

    function render() {
        const now = new Date();
        
        // --- 任務清單 ---
        const listEl = document.getElementById('taskList');
        const sortedTasks = data.basic.map((t, i) => {
            const start = new Date(t.lastDate).getTime();
            const freqMs = (t.freq || 1) * 86400000;
            const end = start + freqMs;
            const progress = Math.min(Math.max(((now.getTime() - start) / freqMs) * 100, 0), 100);
            const daysSince = Math.floor((now.getTime() - start) / 86400000);
            const targetDate = new Date(end);
            return { ...t, end: targetDate, progress, isDue: now.getTime() >= end, i, daysSince };
        }).sort((a, b) => a.end - b.end);

        listEl.innerHTML = sortedTasks.map(t => `
            <div class="item-row">
                <div style="flex:1;" onclick="openTaskModal(${t.i})">
                    <div style="font-size:15px; ${t.isDue?'color:var(--terracotta);font-weight:bold':''}">${t.name}</div>
                    <div class="stats-line">上次更換：${t.daysSince} 天前 | 預計：${t.end.getMonth()+1}/${t.end.getDate()}</div>
                </div>
                <div class="btn-progress-container" onclick="doneBasic(${t.i})">
                    <div class="progress-fill" style="width:${t.progress}%; background:${t.isDue?'var(--terracotta)':'rgba(159, 163, 138, 0.5)'};"></div>
                    <div class="btn-label">DONE</div>
                </div>
            </div>`).join('');

        // --- 床單邏輯 ---
        const sheetStart = new Date(data.sheetLastDate || now).getTime();
        const sheetDays = Math.floor((now.getTime() - sheetStart) / 86400000);
        document.getElementById('sheetDaysInfo').innerText = `目前這套已使用：${sheetDays} 天`;

        let pool = [];
        const sSet = data.sheets.filter(s => s.type === 'summer'), aSet = data.sheets.filter(s => s.type === 'all');
        if (data.coolMode && sSet.length > 0) {
            const m = Math.max(sSet.length, aSet.length);
            for(let i=0; i<m; i++) { if(sSet[i%sSet.length]) pool.push(sSet[i%sSet.length]); if(aSet[i%aSet.length]) pool.push(aSet[i%aSet.length]); }
        } else { pool = aSet.length > 0 ? aSet : data.sheets; }

        let recIdx = data.sheetIdx % (pool.length || 1);
        let recSheet = pool[recIdx] || { name: "無庫存" };
        if (pool.length > 1 && recSheet.name === data.currentSheet) { recIdx = (recIdx + 1) % pool.length; recSheet = pool[recIdx]; }

        document.getElementById('nextSheetName').innerText = recSheet.name;
        document.getElementById('currentStatusBar').innerText = `Current: ${data.currentSheet}`;
        document.getElementById('coolMode').checked = data.coolMode;

        document.getElementById('sheetInventory').innerHTML = data.sheets.map((s, idx) => `
            <div class="item-row">
                <span onclick="openSheetModal(${idx})" style="font-size:14px; text-decoration:underline; cursor:pointer;">${s.name} <small style="color:var(--text-dim)">[${s.type==='summer'?'夏':'通'}]</small></span>
                <button class="btn-add" style="padding:4px 8px; border-width:1px;" onclick="setActiveSheet(${idx})">SET ACTIVE</button>
            </div>`).join('');

        document.getElementById('backupCode').value = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    }

    // --- 功能函式 ---
    function doneBasic(idx) { data.basic[idx].lastDate = new Date().toISOString(); save(); }
    function rotateSheet() { 
        const next = document.getElementById('nextSheetName').innerText; 
        if(next !== "無庫存") { data.currentSheet = next; data.sheetIdx++; data.sheetLastDate = new Date().toISOString(); save(); } 
    }
    function setActiveSheet(idx) { data.currentSheet = data.sheets[idx].name; data.sheetIdx = idx + 1; data.sheetLastDate = new Date().toISOString(); save(); }
    function addSheet() { const n = document.getElementById('sName').value, t = document.getElementById('sType').value; if(n) { data.sheets.push({ name: n, type: t }); document.getElementById('sName').value=''; save(); } }
    function addBasic() { const n = document.getElementById('bName').value, v = parseFloat(document.getElementById('bVal').value), u = parseFloat(document.getElementById('bUnit').value); if(n && v) { data.basic.push({ name: n, freq: v * u, lastDate: new Date().toISOString() }); document.getElementById('bName').value=''; save(); save(); } }

    // --- 編輯彈窗 ---
    function openTaskModal(idx) {
        editState = { type: 'task', idx };
        const t = data.basic[idx];
        document.getElementById('modalContent').innerHTML = `
            <div class="section-title">EDIT TASK</div>
            <input type="text" id="editN" value="${t.name}" style="width:100%; font-size:18px; color:white; border-bottom:1px solid var(--olive); margin-bottom:20px; background:transparent;">
            <div class="section-title">FREQUENCY (DAYS)</div>
            <input type="number" id="editV" value="${t.freq}" style="width:100%; font-size:18px; color:white; border-bottom:1px solid var(--border); margin-bottom:30px; background:transparent;">
            <div style="display:flex; gap:10px;">
                <button class="btn-add" style="flex:2; background:var(--olive); color:var(--bg); border:none; padding:12px;" onclick="confirmEdit('task')">UPDATE</button>
                <button class="btn-add" style="flex:1; border-color:var(--terracotta); color:var(--terracotta);" onclick="deleteItem()">DEL</button>
            </div>
            <div style="text-align:center; margin-top:20px;"><span onclick="closeM()" style="font-size:11px; color:var(--text-dim); cursor:pointer;">CANCEL</span></div>
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function openSheetModal(idx) {
        editState = { type: 'sheet', idx };
        const s = data.sheets[idx];
        document.getElementById('modalContent').innerHTML = `
            <div class="section-title">EDIT BEDDING</div>
            <input type="text" id="editN" value="${s.name}" style="width:100%; font-size:18px; color:white; border-bottom:1px solid var(--olive); margin-bottom:20px; background:transparent;">
            <div style="display:flex; gap:10px; margin-bottom:30px;">
                <button class="btn-add" style="flex:1; ${s.type==='all'?'background:var(--olive);color:var(--bg)':''}" onclick="updateSType('all')">四季</button>
                <button class="btn-add" style="flex:1; ${s.type==='summer'?'background:var(--olive);color:var(--bg)':''}" onclick="updateSType('summer')">夏季</button>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn-add" style="flex:2; background:var(--olive); color:var(--bg); border:none; padding:12px;" onclick="confirmEdit('sheet')">UPDATE</button>
                <button class="btn-add" style="flex:1; border-color:var(--terracotta); color:var(--terracotta);" onclick="deleteItem()">DEL</button>
            </div>
            <div style="text-align:center; margin-top:20px;"><span onclick="closeM()" style="font-size:11px; color:var(--text-dim); cursor:pointer;">CANCEL</span></div>
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function confirmEdit(type) {
        const name = document.getElementById('editN').value;
        if(type === 'task') { data.basic[editState.idx].name = name; data.basic[editState.idx].freq = parseFloat(document.getElementById('editV').value); }
        else { data.sheets[editState.idx].name = name; }
        save(); closeM();
    }
    function updateSType(t) { data.sheets[editState.idx].type = t; openSheetModal(editState.idx); }
    function closeM() { document.getElementById('modalOverlay').style.display = 'none'; }
    function deleteItem() { if(confirm("確定刪除？")) { if(editState.type==='task') data.basic.splice(editState.idx, 1); else data.sheets.splice(editState.idx, 1); save(); closeM(); } }
    function toggleCooling() { data.coolMode = document.getElementById('coolMode').checked; save(); }
    function tab(id, e) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); e.currentTarget.classList.add('active'); render(); }
    function copyBackup() { document.getElementById('backupCode').select(); document.execCommand('copy'); alert("Copied"); }
    function importData() { const c = document.getElementById('importInput').value; if(c) { try { data = JSON.parse(decodeURIComponent(escape(atob(c)))); save(); alert("Success"); } catch(e) { alert("Error"); } } }

    setInterval(render, 1000);
    render();
</script>
</body>
</html>
