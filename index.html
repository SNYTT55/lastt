<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SHIFT_V8.8_LAYOUT_FIX</title>
    <style>
        :root {
            --bg: #f9f8f6; --card: #ffffff; --field: #f1f0ed;
            --border: #e2e0db; --text-dim: #92908c; --text-main: #4a4947; 
            --accent: #9fa38a; --danger: #b36a5b; 
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: -apple-system, "PingFang TC", sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; line-height: 1.5; }
        
        /* 修正 1: 容器寬度與內距 */
        .container { width: 100%; max-width: 480px; padding: 30px 20px; }
        
        .nav { display: flex; gap: 24px; margin-bottom: 25px; border-bottom: 1px solid var(--border); }
        .nav-btn { background: none; border: none; color: var(--text-dim); font-size: 14px; font-weight: 500; cursor: pointer; padding: 12px 0; position: relative; }
        .nav-btn.active { color: var(--text-main); font-weight: 600; }
        .nav-btn.active::after { content: ""; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--accent); }

        .admin-drawer { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 25px; border: 1px solid var(--border); }
        .section-title { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 15px; letter-spacing: 0.1em; }
        
        /* 修正 2: 解決輸入框擠在一起的問題 */
        .input-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .input-row input[type="text"] { flex: 2; min-width: 120px; }
        .input-row input[type="number"] { flex: 0.8; min-width: 60px; }
        .input-row select { flex: 0.7; min-width: 60px; }
        .input-row .btn-add { flex: 0.5; min-width: 44px; }

        input, select { background: var(--field); border: 1px solid transparent; border-radius: 8px; color: var(--text-main); font-size: 14px; outline: none; padding: 8px 10px; height: 38px; }
        
        .btn-add { background: var(--accent); border: none; color: #fff; height: 38px; padding: 0 12px; border-radius: 8px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* 修正 3: 列表項目的間距 */
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); gap: 15px; }
        .item-info { flex: 1; cursor: pointer; min-width: 0; /* 防止文字溢出 */ }
        .item-name { font-size: 16px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

        .progress-btn { width: 85px; height: 36px; background: var(--field); border-radius: 6px; position: relative; overflow: hidden; cursor: pointer; border: 1px solid var(--border); flex-shrink: 0; }
        .progress-fill { position: absolute; height: 100%; transition: width 0.6s ease; }
        .progress-text { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; z-index: 2; pointer-events: none; }

        /* Bedding Cards */
        .split-recommend-container { display: flex; gap: 12px; margin-bottom: 25px; }
        .side-card { flex: 1; border-radius: 20px; padding: 18px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border); background: var(--card); min-height: 140px; }
        .next-side { background: var(--accent); color: #fff; border: none; cursor: pointer; }
        .sheet-val { font-size: 18px; font-weight: 600; margin-top: 4px; word-break: break-all; }

        /* Modal */
        #modalOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.1); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; z-index:100; }
        .modal-card { background:var(--card); width:90%; max-width:340px; padding:25px; border-radius:20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="modalOverlay" onclick="closeModal()">
    <div class="modal-card" id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<div class="container">
    <div class="nav">
        <button class="nav-btn active" onclick="tab('basic', event)">日常</button>
        <button class="nav-btn" onclick="tab('bedding', event)">寢具</button>
        <button class="nav-btn" onclick="tab('system', event)">數據</button>
    </div>

    <div id="basic" class="tab-content active">
        <div class="admin-drawer">
            <div class="section-title">新事項</div>
            <div class="input-row">
                <input type="text" id="bName" placeholder="名稱">
                <input type="number" id="bVal" placeholder="頻率">
                <select id="bUnit"><option value="1">日</option><option value="7">週</option></select>
                <button class="btn-add" onclick="addBasic()">＋</button>
            </div>
        </div>
        <div id="taskList"></div>
    </div>

    <div id="bedding" class="tab-content">
        <div class="split-recommend-container">
            <div class="side-card current-side">
                <div class="section-title" style="margin:0">使用中</div>
                <div id="currentSheetName" class="sheet-val">---</div>
                <div id="sheetDaysInfo" style="font-size:10px; color:var(--text-dim); margin-top:8px;">0 天</div>
            </div>
            <div class="side-card next-side" onclick="rotateSheet()">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <span class="section-title" style="margin:0; color:rgba(255,255,255,0.8)">更換預告</span>
                    <input type="checkbox" id="coolMode" onchange="toggleCooling(event)" onclick="event.stopPropagation()">
                </div>
                <div id="nextSheetName" class="sheet-val">---</div>
                <div style="font-size:11px; font-weight:600; text-align:right;">次循環 ➔</div>
            </div>
        </div>
        <div class="admin-drawer">
            <div class="section-title">新增款式</div>
            <div class="input-row">
                <input type="text" id="sName" placeholder="款式名稱" style="flex:2">
                <select id="sType" style="flex:1"><option value="all">四季</option><option value="summer">夏季</option></select>
                <button class="btn-add" onclick="addSheet()">＋</button>
            </div>
        </div>
        <div id="sheetInventory"></div>
    </div>

    <div id="system" class="tab-content">
        <div class="admin-drawer">
            <div class="section-title">數據備份</div>
            <textarea id="backupCode" readonly style="width:100%; height:80px; background:var(--field); border:1px solid var(--border); border-radius:8px; padding:10px; font-size:10px; margin-bottom:12px; outline:none; resize:none;"></textarea>
            <div style="display:flex; gap:10px;">
                <button class="btn-add" style="flex:1; background:var(--card); color:var(--text-main); border:1px solid var(--border);" onclick="copyBackup()">複製</button>
                <button class="btn-add" style="flex:1; background:var(--card); color:var(--text-main); border:1px solid var(--border);" onclick="importData()">導入</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 邏輯保持與 V8.7 一致，僅修正渲染時的 DOM 結構以配合 CSS
    const STORAGE_KEY = 'shift_v8_zen_data';
    const now = new Date();

    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { basic: [], sheets: [], sheetIdx: 0, currentSheet: "無資料", sheetLastDate: now.toISOString(), coolMode: false };
    
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); render(); }

    function render() {
        const taskList = data.basic.map((t, idx) => {
            const start = new Date(t.lastDate).getTime();
            const freqMs = (t.freq || 1) * 86400000;
            const elapsed = now.getTime() - start;
            const progress = Math.min(Math.max((elapsed / freqMs) * 100, 0), 100);
            const isDue = elapsed >= freqMs;
            return { ...t, idx, end: start + freqMs, progress, isDue, days: (elapsed/86400000).toFixed(1) };
        }).sort((a, b) => a.end - b.end);

        document.getElementById('taskList').innerHTML = taskList.map(t => `
            <div class="item-row">
                <div class="item-info" onclick="openModal('task', ${t.idx})">
                    <div class="item-name" style="${t.isDue ? 'color:var(--danger); font-weight:600;' : ''}">${t.name}</div>
                    <div class="item-meta">已累積 ${t.days} / ${t.freq} 天</div>
                </div>
                <div class="progress-btn" onclick="doneBasic(${t.idx})">
                    <div class="progress-fill" style="width:${t.progress}%; background:${t.isDue ? 'var(--danger)' : 'var(--accent)'}; opacity:0.3;"></div>
                    <div class="progress-text">DONE</div>
                </div>
            </div>`).join('');

        document.getElementById('currentSheetName').innerText = data.currentSheet;
        const sDiff = Math.floor((now.getTime() - new Date(data.sheetLastDate).getTime()) / 86400000);
        document.getElementById('sheetDaysInfo').innerText = `${sDiff} 天使用中`;

        let pool = data.sheets.filter(s => !data.coolMode || s.type === 'summer' || s.type === 'all');
        let rec = pool[data.sheetIdx % (pool.length || 1)] || { name: "無資料" };
        document.getElementById('nextSheetName').innerText = rec.name;
        document.getElementById('coolMode').checked = data.coolMode;

        document.getElementById('sheetInventory').innerHTML = data.sheets.map((s, idx) => `
            <div class="item-row">
                <div class="item-info" onclick="openModal('sheet', ${idx})">
                    <div class="item-name">${s.name}</div>
                    <div class="item-meta">${s.type === 'all' ? '四季' : '夏季'}</div>
                </div>
                <button class="btn-add" style="background:var(--card); color:var(--text-main); border:1px solid var(--border); font-size:11px; height:32px;" onclick="setActiveSheet(${idx})">套用</button>
            </div>`).join('');
        document.getElementById('backupCode').value = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    }

    // (功能函數 addBasic, addSheet, doneBasic, setActiveSheet, rotateSheet, tab, closeModal, openModal, updateItem, deleteItem, copyBackup, importData 均與前版相同)
    function tab(id, e) { document.querySelectorAll('.tab-content, .nav-btn').forEach(el => el.classList.remove('active')); document.getElementById(id).classList.add('active'); e.currentTarget.classList.add('active'); }
    function addBasic() { const n = document.getElementById('bName').value, v = parseFloat(document.getElementById('bVal').value), u = parseFloat(document.getElementById('bUnit').value); if(n && v) { data.basic.push({ name: n, freq: v*u, lastDate: new Date().toISOString() }); save(); document.getElementById('bName').value=''; document.getElementById('bVal').value=''; } }
    function addSheet() { const n = document.getElementById('sName').value, t = document.getElementById('sType').value; if(n) { data.sheets.push({ name: n, type: t }); save(); document.getElementById('sName').value=''; } }
    function doneBasic(idx) { data.basic[idx].lastDate = new Date().toISOString(); save(); }
    function setActiveSheet(idx) { data.currentSheet = data.sheets[idx].name; data.sheetLastDate = new Date().toISOString(); save(); }
    function rotateSheet() { const next = document.getElementById('nextSheetName').innerText; if(next !== "無資料") { data.currentSheet = next; data.sheetIdx++; data.sheetLastDate = new Date().toISOString(); save(); } }
    function toggleCooling(e) { data.coolMode = e.target.checked; save(); }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function openModal(type, idx) {
        const item = type === 'task' ? data.basic[idx] : data.sheets[idx];
        let content = `<div class="section-title">編輯${type === 'task' ? '事項' : '寢具'}</div>`;
        if(type === 'task') {
            content += `<input type="text" id="editN" value="${item.name}" style="width:100%; margin-bottom:10px;"><input type="number" id="editF" value="${item.freq}" style="width:100%; margin-bottom:20px;">`;
        } else {
            content += `<input type="text" id="editN" value="${item.name}" style="width:100%; margin-bottom:10px;"><select id="editT" style="width:100%; margin-bottom:20px;"><option value="all" ${item.type==='all'?'selected':''}>四季</option><option value="summer" ${item.type==='summer'?'selected':''}>夏季</option></select>`;
        }
        content += `<div style="display:flex; gap:10px;"><button class="btn-add" style="flex:1.5;" onclick="updateItem('${type}', ${idx})">儲存</button><button class="btn-add" style="flex:1; background:#fff; color:var(--danger); border:1px solid var(--danger);" onclick="deleteItem('${type}', ${idx})">刪除</button></div>`;
        document.getElementById('modalContent').innerHTML = content;
        document.getElementById('modalOverlay').style.display = 'flex';
    }
    function updateItem(type, idx) {
        if(type === 'task') { data.basic[idx].name = document.getElementById('editN').value; data.basic[idx].freq = parseFloat(document.getElementById('editF').value); }
        else { data.sheets[idx].name = document.getElementById('editN').value; data.sheets[idx].type = document.getElementById('editT').value; }
        closeModal(); save();
    }
    function deleteItem(type, idx) { if(confirm("確定刪除？")) { data[type === 'task' ? 'basic' : 'sheets'].splice(idx, 1); closeModal(); save(); } }
    function copyBackup() { document.getElementById('backupCode').select(); document.execCommand('copy'); alert("資料已複製"); }
    function importData() { const code = prompt("輸入資料代碼："); if(code) { try { data = JSON.parse(decodeURIComponent(escape(atob(code)))); save(); } catch(e) { alert("代碼錯誤"); } } }

    render();
</script>
</body>
</html>
