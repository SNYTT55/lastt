<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SHIFT_DOMESTIC_V5.5</title>
    <style>
        :root {
            --mj-bg: #1a1a1c;
            --mj-card-bg: #242427;
            --mj-border: rgba(255, 255, 255, 0.08);
            --mj-text-main: #e4e4e7;
            --mj-text-sub: #82828c;
            --mj-olive: #c8fcbd;      
            --mj-terracotta: #edc108; 
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: "Helvetica Neue", sans-serif; background: var(--mj-bg); color: var(--mj-text-main); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; padding-bottom: 50px; }

        /* 導航 */
        .mode-switcher { background: rgba(0,0,0,0.4); border-radius: 12px; display: flex; padding: 4px; margin-bottom: 20px; border: 1px solid var(--mj-border); }
        .mode-btn { flex: 1; border: none; padding: 10px 5px; border-radius: 8px; font-size: 11px; cursor: pointer; color: var(--mj-text-sub); background: transparent; font-weight: 900; }
        .mode-btn.active { background: #f5f5f7; color: #000; }

        .tab-content { display: none; animation: mjFade 0.2s ease; }
        .tab-content.active { display: block; }

        /* 列表樣式 */
        .task-item { background: var(--mj-card-bg); padding: 12px 16px; border-radius: 14px; border: 1px solid var(--mj-border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .task-name { font-weight: 700; font-size: 15px; color: #fff; cursor: pointer; text-decoration: underline; text-decoration-color: rgba(255,255,255,0.2); }
        .task-meta { font-size: 11px; color: var(--mj-text-sub); margin-top: 3px; }

        /* 看板核心 */
        .sheet-card { background: var(--mj-card-bg); border-radius: 20px; border: 1px solid var(--mj-border); padding: 25px 20px; text-align: center; margin-bottom: 15px; position: relative; overflow: hidden; }
        .cool-toggle-wrap { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.3); padding: 5px 8px; border-radius: 8px; border: 1px solid var(--mj-terracotta); }
        .cool-toggle-wrap label { font-size: 9px; font-weight: 900; color: var(--mj-terracotta); }
        .sheet-current { font-size: 26px; font-weight: 900; margin: 12px 0; color: #fff; }
        .status-bar { margin-bottom: 20px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 10px; font-size: 11px; color: var(--mj-text-sub); }
        .status-bar b { color: var(--mj-olive); font-family: monospace; }

        /* 輸入框組 */
        .admin-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 14px; margin-bottom: 16px; border: 1px solid var(--mj-border); }
        .input-stack { display: flex; flex-direction: column; gap: 8px; }
        .input-row { display: flex; gap: 6px; }
        input, select, textarea { background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-size: 14px; outline: none; width: 100%; }
        .primary-btn { background: transparent; border: 1.5px solid var(--mj-olive); color: var(--mj-olive); padding: 10px 15px; border-radius: 10px; font-size: 12px; font-weight: 900; white-space: nowrap; cursor: pointer; }
        .inventory-item { display:flex; justify-content:space-between; align-items:center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        @keyframes mjFade { from { opacity:0; } to { opacity:1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="mode-switcher">
        <button class="mode-btn active" onclick="switchTab('basic', event)">TASKS</button>
        <button class="mode-btn" onclick="switchTab('bedding', event)">SHEETS</button>
        <button class="mode-btn" onclick="switchTab('notes', event)">NOTES</button>
        <button class="mode-btn" onclick="switchTab('system', event)">DATA</button>
    </div>

    <div id="basic" class="tab-content active">
        <div class="admin-box">
            <div class="input-stack">
                <input type="text" id="bName" placeholder="任務名稱">
                <div class="input-row">
                    <input type="number" id="bVal" placeholder="頻率" style="flex: 2;">
                    <select id="bUnit" style="flex: 2;">
                        <option value="1">天</option>
                        <option value="7">週</option>
                        <option value="30">月</option>
                    </select>
                    <button class="primary-btn" style="flex: 1;" onclick="addBasic()">ADD</button>
                </div>
            </div>
        </div>
        <div id="taskList"></div>
    </div>

    <div id="bedding" class="tab-content">
        <div class="sheet-card">
            <div class="cool-toggle-wrap">
                <label>涼墊</label>
                <input type="checkbox" id="coolMode" onchange="toggleCooling()">
            </div>
            <div style="font-size: 10px; font-weight: 900; color: var(--mj-text-sub);">NEXT RECOMMENDATION</div>
            <div id="nextSheetName" class="sheet-current">---</div>
            <div class="status-bar" id="currentStatusBar">目前使用：<b>尚未紀錄</b></div>
            <button class="primary-btn" style="width: 100%; border-radius: 12px; padding: 14px;" onclick="rotateSheet()">確認已更換</button>
        </div>

        <div class="admin-box">
            <div style="font-size: 11px; font-weight: 900; color: var(--mj-olive); margin-bottom: 12px;">庫存管理 (點擊名稱編輯)</div>
            <div id="sheetInventory" style="max-height: 180px; overflow-y: auto;"></div>
            <hr style="border: 0; border-top: 1px solid var(--mj-border); margin: 15px 0;">
            <div class="input-stack">
                <input type="text" id="sName" placeholder="新床包名稱">
                <div class="input-row">
                    <select id="sType" style="flex: 2;">
                        <option value="all">四季舒服款</option>
                        <option value="summer">夏季優先款</option>
                    </select>
                    <button class="primary-btn" style="flex: 1;" onclick="addSheet()">ADD</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notes" class="tab-content"><textarea id="memo" style="height: 400px; background:#000; color:#fff; padding:15px; width:100%; border-radius:12px;" oninput="saveMemo()"></textarea></div>
    <div id="system" class="tab-content">
        <div class="admin-box">
            <textarea id="backupCode" style="height: 120px; font-family: monospace; font-size: 11px; color: #666; width:100%;" readonly></textarea>
            <button class="primary-btn" style="width: 100%; margin-top: 10px;" onclick="copyBackup()">複製備份碼</button>
            <button class="primary-btn" style="width: 100%; border-color: var(--mj-terracotta); color: var(--mj-terracotta); margin-top: 10px;" onclick="importData()">導入資料</button>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('shift_v5_5_data')) || {
        basic: [],
        sheets: [],
        sheetIdx: 0,
        currentSheet: "尚未開始",
        coolMode: false,
        memo: ""
    };

    function switchTab(id, e) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
        render();
    }

    function render() {
        const today = new Date();
        
        // 1. 基礎家事 (新增編輯與刪除功能)
        const listEl = document.getElementById('taskList');
        const sorted = data.basic.map((t, originalIdx) => {
            const last = new Date(t.lastDate);
            const next = new Date(last.getTime() + t.freq * 86400000);
            return { ...t, next, diff: Math.floor((today - last) / 86400000), originalIdx };
        }).sort((a, b) => a.next - b.next);

        listEl.innerHTML = sorted.map(t => `
            <div class="task-item">
                <div style="flex:1;">
                    <div class="task-name" onclick="editBasic(${t.originalIdx})">${t.name}</div>
                    <div class="task-meta">已過 ${t.diff}d · 預計 ${t.next.getMonth()+1}/${t.next.getDate()} (每${t.freq}天)</div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="primary-btn" style="border-color:#ff4444; color:#ff4444; padding: 6px 10px;" onclick="deleteBasic(${t.originalIdx})">✕</button>
                    <button class="primary-btn" onclick="doneBasic(${t.originalIdx})">DONE</button>
                </div>
            </div>
        `).join('') || '<div style="text-align:center; padding:20px; color:#888;">無任務</div>';

        // 2. 床單管理 (維持 V5.4 優化排版)
        document.getElementById('coolMode').checked = data.coolMode;
        let pool = [];
        const summerSet = data.sheets.filter(s => s.type === 'summer');
        const allSet = data.sheets.filter(s => s.type === 'all');
        if (data.coolMode) {
            const max = Math.max(summerSet.length, allSet.length);
            for(let i=0; i<max; i++) {
                if(summerSet[i % summerSet.length]) pool.push(summerSet[i % summerSet.length]);
                if(summerSet[(i+1) % summerSet.length]) pool.push(summerSet[(i+1) % summerSet.length]);
                if(allSet[i % allSet.length]) pool.push(allSet[i % allSet.length]);
            }
        } else { pool = allSet.length > 0 ? allSet : data.sheets; }

        const nextS = pool[data.sheetIdx % (pool.length || 1)] || { name: "請新增床包" };
        document.getElementById('nextSheetName').innerText = nextS.name;
        document.getElementById('currentStatusBar').innerHTML = `目前使用：<b>${data.currentSheet}</b>`;

        const invEl = document.getElementById('sheetInventory');
        invEl.innerHTML = data.sheets.map((s, idx) => `
            <div class="inventory-item">
                <span onclick="editSheet(${idx})" style="cursor:pointer; color: ${s.type==='summer'? 'var(--mj-terracotta)':'#fff'}; text-decoration:underline;">
                    ${s.name} ${s.type==='summer'?'(夏)':'(通)'}
                </span>
                <button onclick="deleteSheet(${idx})" style="background:transparent; border:none; color:#ff4444; font-size:11px;">移除</button>
            </div>
        `).join('') || '<div style="color:#888; font-size:11px;">庫存空</div>';

        // 3. 數據同步
        document.getElementById('memo').value = data.memo;
        document.getElementById('backupCode').value = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        localStorage.setItem('shift_v5_5_data', JSON.stringify(data));
    }

    // --- 基礎家事邏輯 ---
    function addBasic() {
        const n = document.getElementById('bName').value, v = parseInt(document.getElementById('bVal').value), u = parseInt(document.getElementById('bUnit').value);
        if(n && v) { data.basic.push({ name: n, freq: v * u, lastDate: new Date().toISOString() }); render(); }
    }
    function doneBasic(idx) {
        data.basic[idx].lastDate = new Date().toISOString();
        render();
    }
    function editBasic(idx) {
        const t = data.basic[idx];
        const newName = prompt("修改任務名稱：", t.name);
        if(!newName) return;
        const newFreq = parseInt(prompt("修改頻率 (天數)：", t.freq));
        if(newFreq) {
            data.basic[idx].name = newName;
            data.basic[idx].freq = newFreq;
            render();
        }
    }
    function deleteBasic(idx) {
        if(confirm(`確定刪除任務「${data.basic[idx].name}」？`)) {
            data.basic.splice(idx, 1);
            render();
        }
    }

    // --- 床包邏輯 ---
    function rotateSheet() {
        let pool = [];
        const summerSet = data.sheets.filter(s => s.type === 'summer'), allSet = data.sheets.filter(s => s.type === 'all');
        if (data.coolMode) {
            const max = Math.max(summerSet.length, allSet.length);
            for(let i=0; i<max; i++) {
                if(summerSet[i % summerSet.length]) pool.push(summerSet[i % summerSet.length]);
                if(summerSet[(i+1) % summerSet.length]) pool.push(summerSet[(i+1) % summerSet.length]);
                if(allSet[i % allSet.length]) pool.push(allSet[i % allSet.length]);
            }
        } else { pool = allSet.length > 0 ? allSet : data.sheets; }
        
        const currentRec = pool[data.sheetIdx % (pool.length || 1)];
        if(currentRec) { data.currentSheet = currentRec.name; data.sheetIdx++; render(); }
    }
    function toggleCooling() { data.coolMode = document.getElementById('coolMode').checked; data.sheetIdx = 0; render(); }
    function addSheet() {
        const n = document.getElementById('sName').value, t = document.getElementById('sType').value;
        if(n) { data.sheets.push({ name: n, type: t }); render(); }
    }
    function editSheet(idx) {
        const s = data.sheets[idx], n = prompt("改名：", s.name);
        if(n) { data.sheets[idx] = { name: n, type: confirm("夏季優先？")?"summer":"all" }; render(); }
    }
    function deleteSheet(idx) { if(confirm("刪除？")) { data.sheets.splice(idx, 1); render(); } }
    
    // --- 備份 ---
    function saveMemo() { data.memo = document.getElementById('memo').value; localStorage.setItem('shift_v5_5_data', JSON.stringify(data)); }
    function copyBackup() { document.getElementById("backupCode").select(); document.execCommand("copy"); alert("已複製"); }
    function importData() {
        const c = prompt("代碼：");
        if(c) { try { data = JSON.parse(decodeURIComponent(escape(atob(c)))); render(); } catch(e) { alert("錯誤"); } }
    }

    render();
</script>
</body>
</html>
