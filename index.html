<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SHIFT_DOMESTIC_V5.2</title>
    <style>
        :root {
            --mj-bg: #1a1a1c;
            --mj-card-bg: #242427;
            --mj-border: rgba(255, 255, 255, 0.08);
            --mj-text-main: #e4e4e7;
            --mj-text-sub: #82828c;
            --mj-olive: #c8fcbd;      
            --mj-terracotta: #edc108; 
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; letter-spacing: 0.02em; }
        body { font-family: "Helvetica Neue", sans-serif; background: var(--mj-bg); color: var(--mj-text-main); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; padding: 20px; padding-bottom: 50px; }

        /* 分頁導航 */
        .mode-switcher { background: rgba(0,0,0,0.4); border-radius: 12px; display: flex; padding: 4px; margin-bottom: 20px; border: 1px solid var(--mj-border); }
        .mode-btn { flex: 1; border: none; padding: 8px; border-radius: 8px; font-size: 11px; cursor: pointer; color: var(--mj-text-sub); background: transparent; font-weight: 900; }
        .mode-btn.active { background: #f5f5f7; color: #000; }

        .tab-content { display: none; animation: mjFade 0.2s ease; }
        .tab-content.active { display: block; }

        /* 家事列表 */
        .task-item {
            background: var(--mj-card-bg); padding: 12px 16px; border-radius: 12px; border: 1px solid var(--mj-border);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
        }
        .task-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
        .task-meta { font-size: 11px; color: var(--mj-text-sub); }

        /* 床單看板 */
        .sheet-card { background: var(--mj-card-bg); border-radius: 16px; border: 1px solid var(--mj-border); padding: 25px; text-align: center; margin-bottom: 15px; }
        .sheet-current { font-size: 24px; font-weight: 900; margin: 15px 0; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
        
        .toggle-box { background: #000; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border: 1px solid var(--mj-terracotta); }
        .toggle-label { font-size: 12px; font-weight: 900; color: var(--mj-terracotta); }

        /* 表單與清單 */
        .admin-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--mj-border); }
        .input-group { display: flex; gap: 5px; margin: 8px 0; }
        input, select, textarea { background: #111; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; font-size: 12px; outline: none; }
        .primary-btn { background: transparent; border: 1px solid var(--mj-olive); color: var(--mj-olive); padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .primary-btn:active { background: var(--mj-olive); color: #000; }

        .inventory-item { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:12px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 5px; }

        @keyframes mjFade { from { opacity:0; } to { opacity:1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="mode-switcher">
        <button class="mode-btn active" onclick="switchTab('basic')">TASKS</button>
        <button class="mode-btn" onclick="switchTab('bedding')">SHEETS</button>
        <button class="mode-btn" onclick="switchTab('notes')">NOTES</button>
        <button class="mode-btn" onclick="switchTab('system')">DATA</button>
    </div>

    <div id="basic" class="tab-content active">
        <div class="admin-box">
            <input type="text" id="bName" placeholder="任務名稱 (如：換牙刷)" style="width: 100%;">
            <div class="input-group">
                <input type="number" id="bVal" placeholder="頻率" style="flex: 1;">
                <select id="bUnit" style="flex: 1;">
                    <option value="1">天</option>
                    <option value="7">週</option>
                    <option value="30">月</option>
                </select>
                <button class="primary-btn" onclick="addBasic()">新增任務</button>
            </div>
        </div>
        <div id="taskList"></div>
    </div>

    <div id="bedding" class="tab-content">
        <div class="toggle-box">
            <span class="toggle-label">涼墊模式開關 (優先推薦夏季款)</span>
            <input type="checkbox" id="coolMode" onchange="toggleCooling()">
        </div>
        
        <div class="sheet-card">
            <div style="font-size: 10px; font-weight: 900; color: var(--mj-text-sub);">NEXT RECOMMENDATION</div>
            <div id="nextSheetName" class="sheet-current">---</div>
            <button class="primary-btn" style="width: 100%; padding: 12px;" onclick="rotateSheet()">確認已更換</button>
        </div>

        <div class="admin-box">
            <div style="font-size: 11px; font-weight: 900; color: var(--mj-olive); margin-bottom: 10px;">庫存管理 (點擊名稱編輯)</div>
            <div id="sheetInventory" style="max-height: 150px; overflow-y: auto;"></div>
            
            <hr style="border: 0; border-top: 1px solid var(--mj-border); margin: 15px 0;">
            
            <input type="text" id="sName" placeholder="床包名稱" style="width: 100%;">
            <div class="input-group">
                <select id="sType" style="flex: 1;">
                    <option value="all">四季舒服款</option>
                    <option value="summer">夏季優先款</option>
                </select>
                <button class="primary-btn" onclick="addSheet()">存入庫存</button>
            </div>
        </div>
    </div>

    <div id="notes" class="tab-content">
        <textarea id="memo" style="width: 100%; height: 350px; background: #0a0a0a; color: #fff; padding: 18px; border-radius: 12px; border: 1px solid var(--mj-border); line-height: 1.6; outline: none;" placeholder="購物清單與備註..." oninput="saveMemo()"></textarea>
    </div>

    <div id="system" class="tab-content">
        <div class="admin-box">
            <div style="font-size: 11px; margin-bottom: 10px; color: var(--mj-text-sub);">BASE64 備份膠囊</div>
            <textarea id="backupCode" style="width: 100%; height: 150px; font-family: monospace; font-size: 10px; margin-bottom: 10px; color: #888;" readonly></textarea>
            <button class="primary-btn" style="width: 100%; margin-bottom: 10px;" onclick="copyBackup()">複製備份碼</button>
            <button class="primary-btn" style="width: 100%; border-color: var(--mj-terracotta); color: var(--mj-terracotta);" onclick="importData()">從備份還原</button>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('shift_v5_2_data')) || {
        basic: [],
        sheets: [],
        sheetIdx: 0,
        coolMode: false,
        memo: ""
    };

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        render();
    }

    function render() {
        const today = new Date();
        
        // 1. 基礎家事
        const listEl = document.getElementById('taskList');
        const sorted = data.basic.map(t => {
            const last = new Date(t.lastDate);
            const next = new Date(last.getTime() + t.freq * 86400000);
            const diff = Math.floor((today - last) / 86400000);
            return { ...t, next, diff };
        }).sort((a, b) => a.next - b.next);

        listEl.innerHTML = sorted.map(t => `
            <div class="task-item">
                <div>
                    <div class="task-name">${t.name}</div>
                    <div class="task-meta">已過 ${t.diff}d · 預計 ${t.next.getMonth()+1}/${t.next.getDate()}</div>
                </div>
                <button class="primary-btn" onclick="doneBasic('${t.name}')">DONE</button>
            </div>
        `).join('') || '<div style="text-align:center; color:var(--mj-text-sub); font-size:12px; margin-top:20px;">尚無任務，請由上方新增</div>';

        // 2. 床單管理與庫存
        const coolMode = data.coolMode;
        document.getElementById('coolMode').checked = coolMode;
        
        let pool = [];
        const summerSet = data.sheets.filter(s => s.type === 'summer');
        const allSet = data.sheets.filter(s => s.type === 'all');

        if (coolMode) {
            // 加權：2夏季1四季
            const max = Math.max(summerSet.length, allSet.length);
            for(let i=0; i<max; i++) {
                if(summerSet[i % summerSet.length]) pool.push(summerSet[i % summerSet.length]);
                if(summerSet[(i+1) % summerSet.length]) pool.push(summerSet[(i+1) % summerSet.length]);
                if(allSet[i % allSet.length]) pool.push(allSet[i % allSet.length]);
            }
        } else {
            pool = allSet.length > 0 ? allSet : data.sheets;
        }

        const nextS = pool[data.sheetIdx % (pool.length || 1)] || { name: "請新增床包" };
        document.getElementById('nextSheetName').innerText = nextS.name;

        const invEl = document.getElementById('sheetInventory');
        invEl.innerHTML = data.sheets.map((s, idx) => `
            <div class="inventory-item">
                <span onclick="editSheet(${idx})" style="cursor:pointer; color: ${s.type==='summer'? 'var(--mj-terracotta)':'#fff'}; text-decoration:underline;">
                    ${s.name} ${s.type==='summer'?'(夏)':'(通)'}
                </span>
                <button onclick="deleteSheet(${idx})" style="background:transparent; border:none; color:#ff4444; cursor:pointer; font-size:10px;">移除</button>
            </div>
        `).join('') || '<div style="color:var(--mj-text-sub); font-size:11px;">庫存空空如也</div>';

        // 3. 其他
        document.getElementById('memo').value = data.memo;
        document.getElementById('backupCode').value = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        localStorage.setItem('shift_v5_2_data', JSON.stringify(data));
    }

    // --- 邏輯功能 ---
    function addBasic() {
        const n = document.getElementById('bName').value;
        const v = parseInt(document.getElementById('bVal').value);
        const u = parseInt(document.getElementById('bUnit').value);
        if(n && v) {
            data.basic.push({ name: n, freq: v * u, lastDate: new Date().toISOString() });
            document.getElementById('bName').value = "";
            render();
        }
    }
    function doneBasic(name) {
        data.basic.find(t => t.name === name).lastDate = new Date().toISOString();
        render();
    }
    function addSheet() {
        const n = document.getElementById('sName').value;
        const t = document.getElementById('sType').value;
        if(n) {
            data.sheets.push({ name: n, type: t });
            document.getElementById('sName').value = "";
            render();
        }
    }
    function editSheet(idx) {
        const s = data.sheets[idx];
        const newName = prompt("修改床包名稱：", s.name);
        if (!newName) return;
        const newType = confirm(`設為夏季優先款？\n(確定：是 / 取消：否)`) ? "summer" : "all";
        data.sheets[idx] = { name: newName, type: newType };
        render();
    }
    function deleteSheet(idx) {
        if (confirm(`刪除「${data.sheets[idx].name}」？`)) {
            data.sheets.splice(idx, 1);
            render();
        }
    }
    function toggleCooling() {
        data.coolMode = document.getElementById('coolMode').checked;
        data.sheetIdx = 0;
        render();
    }
    function rotateSheet() { data.sheetIdx++; render(); }
    function saveMemo() { data.memo = document.getElementById('memo').value; localStorage.setItem('shift_v5_2_data', JSON.stringify(data)); }
    function copyBackup() {
        document.getElementById("backupCode").select();
        document.execCommand("copy");
        alert("備份碼已複製到剪貼簿。");
    }
    function importData() {
        const code = prompt("請貼上 Base64 備份碼：");
        if(code) {
            try {
                data = JSON.parse(decodeURIComponent(escape(atob(code))));
                render();
                alert("還原成功！");
            } catch(e) { alert("無效的備份碼"); }
        }
    }

    render(); // 初始渲染看板
</script>
</body>
</html>
