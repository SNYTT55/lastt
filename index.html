<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SHIFT_V5.8_FINAL</title>
    <style>
        :root {
            --bg: #121214;
            --card: #1c1c1e;
            --border: rgba(255, 255, 255, 0.05);
            --text-dim: #8e8e93;
            --text-main: #f2f2f7;
            --olive: #9fa38a;      
            --terracotta: #b36a5b; 
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: -apple-system, "SF Pro Display", sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; padding: 24px 20px; padding-bottom: 60px; }

        /* 導航 */
        .nav { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .nav-btn { background: none; border: none; color: var(--text-dim); font-size: 11px; font-weight: 800; letter-spacing: 0.1em; cursor: pointer; padding: 10px 0; transition: 0.3s; }
        .nav-btn.active { color: var(--olive); border-bottom: 2px solid var(--olive); }

        .tab-content { display: none; animation: mjFade 0.3s ease; }
        .tab-content.active { display: block; }

        /* 核心看板 */
        .hero-card { background: linear-gradient(145deg, #1e1e20, #161618); border-radius: 28px; padding: 30px 24px; margin-bottom: 24px; position: relative; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hero-label { font-size: 9px; font-weight: 800; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; }
        .hero-title { font-size: 28px; font-weight: 200; margin: 12px 0; color: #fff; }
        
        .cool-toggle { position: absolute; top: 25px; right: 25px; display: flex; align-items: center; gap: 6px; }
        .cool-toggle span { font-size: 9px; font-weight: 800; color: var(--terracotta); }
        
        /* 列表樣式 */
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 5px; border-bottom: 1px solid var(--border); }
        .item-name { font-size: 15px; font-weight: 500; cursor: pointer; }
        .item-sub { font-size: 11px; color: var(--text-dim); font-family: monospace; margin-top: 4px; }

        /* 輸入與按鈕 */
        .admin-box { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 24px; border: 1px solid var(--border); }
        .section-title { font-size: 10px; font-weight: 800; color: var(--olive); margin-bottom: 15px; letter-spacing: 0.1em; }
        
        input, select, textarea { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text-main); padding: 8px 0; font-size: 14px; width: 100%; outline: none; margin-bottom: 15px; }
        .btn-done { background: var(--olive); color: #121214; border: none; padding: 10px 20px; border-radius: 12px; font-size: 10px; font-weight: 800; cursor: pointer; }
        .btn-ghost { background: none; border: 1px solid var(--olive); color: var(--olive); padding: 8px 15px; border-radius: 10px; font-size: 10px; font-weight: 800; cursor: pointer; }

        @keyframes mjFade { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <button class="nav-btn active" onclick="tab('basic', event)">TASKS</button>
        <button class="nav-btn" onclick="tab('bedding', event)">BEDDING</button>
        <button class="nav-btn" onclick="tab('system', event)">DATA</button>
    </div>

    <div id="basic" class="tab-content active">
        <div class="admin-box">
            <div class="section-title">NEW TRACKING</div>
            <input type="text" id="bName" placeholder="任務名稱...">
            <div style="display:flex; gap:12px;">
                <input type="number" id="bVal" placeholder="頻率">
                <select id="bUnit">
                    <option value="1">天 (Days)</option>
                    <option value="7">週 (Weeks)</option>
                </select>
                <button class="btn-done" style="margin-bottom:15px;" onclick="addBasic()">ADD</button>
            </div>
        </div>
        <div id="taskList"></div>
    </div>

    <div id="bedding" class="tab-content">
        <div class="hero-card">
            <div class="cool-toggle">
                <span>COOLING</span>
                <input type="checkbox" id="coolMode" onchange="toggleCooling()">
            </div>
            <div class="hero-label">Recommended</div>
            <div id="nextSheetName" class="hero-title">---</div>
            <div id="currentStatusBar" style="font-size:11px; color:var(--olive); font-family: monospace;">Active: ---</div>
            <button class="btn-done" style="width:100%; margin-top:20px; padding:15px; font-size:12px;" onclick="rotateSheet()">CONFIRM ROTATION</button>
        </div>

        <div class="admin-box">
            <div class="section-title">INVENTORY & SETTINGS</div>
            <div id="sheetInventory" style="margin-bottom: 20px;"></div>
            <input type="text" id="sName" placeholder="新床包名稱...">
            <div style="display:flex; gap:10px;">
                <select id="sType" style="flex:2;">
                    <option value="all">四季 (All Season)</option>
                    <option value="summer">夏季 (Summer)</option>
                </select>
                <button class="btn-done" onclick="addSheet()">SAVE</button>
            </div>
        </div>
    </div>

    <div id="system" class="tab-content">
        <div class="admin-box">
            <div class="section-title">MANUAL OVERRIDE (手動測試區)</div>
            <p style="font-size:11px; color:var(--text-dim); line-height:1.4;">
                你可以點擊上方分頁中的「任務名稱」直接修改日期，或是貼上備份代碼。
            </p>
            <textarea id="backupInput" style="height:80px; font-family:monospace; font-size:10px; background:rgba(0,0,0,0.2); padding:10px; border-radius:10px; margin-top:10px;" placeholder="在此貼上備份碼..."></textarea>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn-ghost" style="flex:1;" onclick="importData()">RESTORE</button>
                <button class="btn-ghost" style="flex:1; border-color:var(--terracotta); color:var(--terracotta);" onclick="copyBackup()">COPY BACKUP</button>
            </div>
        </div>
        
        <div class="admin-box">
            <div class="section-title">PRESET TEST TASK</div>
            <button class="btn-ghost" style="width:100%;" onclick="injectTestTask()">注入一個「過期任務」來測試 DONE</button>
        </div>
    </div>
</div>

<script>
    // 初始化資料，如果完全沒資料，預設一些床單範本
    let data = JSON.parse(localStorage.getItem('shift_v5_8_data')) || {
        basic: [], 
        sheets: [
            {name: "莫蘭迪灰 (通)", type: "all"},
            {name: "亞麻藍 (夏)", type: "summer"}
        ], 
        sheetIdx: 0, 
        currentSheet: "None", 
        coolMode: false
    };

    function tab(id, e) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
        render();
    }

    function render() {
        const today = new Date();
        
        // 1. Tasks 渲染 (含排序與天數計算)
        const listEl = document.getElementById('taskList');
        const sorted = data.basic.map((t, i) => {
            const last = new Date(t.lastDate);
            const next = new Date(last.getTime() + t.freq * 86400000);
            const diff = Math.floor((today - last) / 86400000);
            const remain = Math.ceil((next - today) / 86400000);
            return { ...t, next, diff, remain, i };
        }).sort((a, b) => a.next - b.next);

        listEl.innerHTML = sorted.map(t => `
            <div class="item-row">
                <div onclick="editBasic(${t.i})">
                    <div class="item-name" style="${t.remain <= 0 ? 'color:var(--terracotta);' : ''}">${t.name}</div>
                    <div class="item-sub">${t.diff}d past / ${t.remain <= 0 ? 'DUE NOW' : 'T-' + t.remain + 'd'}</div>
                </div>
                <button class="btn-done" onclick="doneBasic(${t.i})">DONE</button>
            </div>
        `).join('') || '<div style="text-align:center; padding:30px; color:var(--text-dim); font-size:12px;">No active tasks</div>';

        // 2. Bedding 推薦邏輯 (繼承 V5.6 高階加權)
        document.getElementById('coolMode').checked = data.coolMode;
        let pool = [];
        const sSet = data.sheets.filter(s => s.type === 'summer'), aSet = data.sheets.filter(s => s.type === 'all');
        if (data.coolMode && sSet.length > 0) {
            const m = Math.max(sSet.length, aSet.length);
            for(let i=0; i<m; i++) {
                if(sSet[i%sSet.length]) pool.push(sSet[i%sSet.length]);
                if(sSet[(i+1)%sSet.length]) pool.push(sSet[(i+1)%sSet.length]);
                if(aSet[i%aSet.length]) pool.push(aSet[i%aSet.length]);
            }
        } else { pool = aSet.length > 0 ? aSet : data.sheets; }

        const nxt = pool[data.sheetIdx % (pool.length || 1)] || { name: "Add Sheets" };
        document.getElementById('nextSheetName').innerText = nxt.name;
        document.getElementById('currentStatusBar').innerText = `Active: ${data.currentSheet}`;

        // 庫存列表
        document.getElementById('sheetInventory').innerHTML = data.sheets.map((s, idx) => `
            <div class="item-row" style="padding: 10px 0;">
                <span onclick="editSheet(${idx})" style="font-size: 13px; color:${s.type==='summer'?'var(--terracotta)':'var(--text-main)'}; text-decoration:underline;">${s.name}</span>
                <span onclick="deleteSheet(${idx})" style="font-size: 10px; color:var(--terracotta); opacity:0.6; cursor:pointer;">REMOVE</span>
            </div>
        `).join('');

        // 資料持久化
        localStorage.setItem('shift_v5_8_data', JSON.stringify(data));
    }

    // --- 功能函式 ---
    function addBasic() {
        const n = document.getElementById('bName').value, v = parseInt(document.getElementById('bVal').value), u = parseInt(document.getElementById('bUnit').value);
        if(n && v) { data.basic.push({ name: n, freq: v * u, lastDate: new Date().toISOString() }); render(); }
    }
    
    function doneBasic(idx) {
        data.basic[idx].lastDate = new Date().toISOString();
        render();
    }

    function editBasic(idx) {
        const t = data.basic[idx];
        const newName = prompt("任務名稱:", t.name);
        const newFreq = prompt("執行頻率 (天):", t.freq);
        if(newName) {
            data.basic[idx].name = newName;
            data.basic[idx].freq = parseInt(newFreq);
            render();
        }
    }

    function injectTestTask() {
        // 注入一個 20 天前執行的「測試更換牙刷」，頻率 14 天，這會讓它立刻呈現「逾期」狀態
        const testDate = new Date();
        testDate.setDate(testDate.getDate() - 20);
        data.basic.push({ name: "🧪 測試逾期任務", freq: 14, lastDate: testDate.toISOString() });
        tab('basic', { currentTarget: document.querySelector('.nav-btn') }); // 跳回首頁看結果
    }

    function rotateSheet() {
        const nxt = document.getElementById('nextSheetName').innerText;
        data.currentSheet = nxt;
        data.sheetIdx++;
        render();
    }

    function toggleCooling() { data.coolMode = document.getElementById('coolMode').checked; data.sheetIdx = 0; render(); }
    
    function addSheet() {
        const n = document.getElementById('sName').value, t = document.getElementById('sType').value;
        if(n) { data.sheets.push({ name: n, type: t }); render(); }
    }

    function editSheet(idx) {
        const n = prompt("修改名稱:", data.sheets[idx].name);
        if(n) { data.sheets[idx].name = n; data.sheets[idx].type = confirm("是否設為夏季優先款？") ? "summer" : "all"; render(); }
    }

    function deleteSheet(idx) { if(confirm("確定移除此床包？")) { data.sheets.splice(idx, 1); render(); } }

    function copyBackup() {
        const code = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        navigator.clipboard.writeText(code);
        alert("備份碼已複製到剪貼簿");
    }

    function importData() {
        const code = document.getElementById('backupInput').value;
        if(code) {
            try { data = JSON.parse(decodeURIComponent(escape(atob(code)))); render(); alert("資料恢復成功"); }
            catch(e) { alert("無效的代碼"); }
        }
    }

    render();
</script>
</body>
</html>
