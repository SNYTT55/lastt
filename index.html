<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SHIFT_V7.5_CONSISTENT</title>
    <style>
        :root {
            --bg: #121214; --card: #1c1c1e; --field: #252528;
            --border: rgba(255, 255, 255, 0.1); --text-dim: #8e8e93;
            --text-main: #f2f2f7; --olive: #9fa38a; --terracotta: #b36a5b; 
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; padding: 24px 20px; padding-bottom: 60px; }
        
        .nav { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .nav-btn { background: none; border: none; color: var(--text-dim); font-size: 11px; font-weight: 800; cursor: pointer; padding: 10px 0; }
        .nav-btn.active { color: var(--olive); border-bottom: 2px solid var(--olive); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 分欄推薦區 - 雙色版 */
        .split-recommend-container { display: flex; height: 160px; gap: 12px; margin-bottom: 24px; }
        
        .current-side { 
            flex: 1; background: var(--olive); border-radius: 24px; padding: 18px;
            display: flex; flex-direction: column; justify-content: space-between;
            color: var(--bg); /* 橄欖綠底配深色字較高級 */
        }
        
        .next-side { 
            flex: 1.4; background: var(--terracotta); border-radius: 24px; padding: 18px;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; overflow: hidden; cursor: pointer; color: white;
        }

        .sheet-name-small { font-size: 16px; font-weight: 700; line-height: 1.2; }
        .sheet-name-large { font-size: 22px; font-weight: 700; line-height: 1.2; }
        .days-pill-dark { 
            display: inline-block; font-size: 10px; font-weight: 900; 
            background: rgba(0,0,0,0.15); padding: 4px 8px; border-radius: 6px; 
        }
        .action-hint { font-size: 9px; font-weight: 800; opacity: 0.7; letter-spacing: 1px; }

        /* 輸入框對齊校準 */
        .admin-drawer { background: var(--field); border-radius: 20px; padding: 18px; margin-bottom: 24px; border: 1px solid var(--border); }
        .section-title { font-size: 10px; font-weight: 800; color: var(--olive); margin-bottom: 15px; letter-spacing: 0.1em; }
        
        .input-group { display: flex; gap: 10px; align-items: flex-end; } /* 改用 flex-end 讓底線對齊 */
        input, select { 
            background: transparent; border: none; border-bottom: 1px solid var(--border); 
            color: var(--text-main); padding: 8px 0; font-size: 14px; outline: none;
            height: 36px; line-height: 20px;
        }
        select { -webkit-appearance: none; cursor: pointer; color: var(--olive); font-weight: 700; }
        
        .btn-add { 
            background: none; border: 1.5px solid var(--olive); color: var(--olive); 
            height: 36px; padding: 0 16px; border-radius: 10px; font-size: 10px; 
            font-weight: 800; cursor: pointer; display: flex; align-items: center;
        }

        /* 彈窗樣式對齊 */
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-card { background: var(--card); width: 88%; max-width: 340px; padding: 25px; border-radius: 30px; border: 1px solid var(--border); }
        .modal-input { width: 100%; font-size: 18px; color: white; border: none; border-bottom: 1.5px solid var(--olive); margin-bottom: 25px; background: transparent; outline: none; padding: 8px 0; }
        .modal-sub-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 25px; }
        .modal-btn-main { flex: 2; background: var(--olive); color: var(--bg); border: none; height: 48px; border-radius: 14px; font-weight: 800; font-size: 11px; cursor: pointer; }
        .modal-btn-del { flex: 1; border: 1.5px solid var(--terracotta); color: var(--terracotta); height: 48px; border-radius: 14px; font-weight: 800; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div id="modalOverlay"><div id="modalContent" class="modal-card"></div></div>

<div class="container">
    <div class="nav">
        <button class="nav-btn active" onclick="tab('basic', event)">TASKS</button>
        <button class="nav-btn" onclick="tab('bedding', event)">BEDDING</button>
        <button class="nav-btn" onclick="tab('system', event)">DATA</button>
    </div>

    <div id="basic" class="tab-content active">
        <div class="admin-drawer">
            <div class="section-title">NEW TASK</div>
            <div class="input-group">
                <input type="text" id="bName" placeholder="任務..." style="flex:2;">
                <input type="number" id="bVal" placeholder="頻率" style="flex:0.8;">
                <select id="bUnit" style="flex:0.7;">
                    <option value="1">天</option><option value="7">週</option><option value="30">月</option>
                </select>
                <button class="btn-add" onclick="addBasic()">ADD</button>
            </div>
        </div>
        <div id="taskList"></div>
    </div>

    <div id="bedding" class="tab-content">
        <div class="split-recommend-container">
            <div class="current-side">
                <div>
                    <div class="section-title" style="color:rgba(0,0,0,0.4); margin-bottom:4px;">CURRENT</div>
                    <div id="currentSheetName" class="sheet-name-small">---</div>
                </div>
                <div id="sheetDaysInfo" class="days-pill-dark">0 DAYS</div>
            </div>
            <div class="next-side" onclick="rotateSheet()">
                <div style="position:absolute; top:15px; right:15px; z-index:5;">
                    <input type="checkbox" id="coolMode" onchange="toggleCooling(event)" onclick="event.stopPropagation()">
                </div>
                <div>
                    <div class="section-title" style="color:rgba(255,255,255,0.4); margin-bottom:4px;">NEXT</div>
                    <div id="nextSheetName" class="sheet-name-large">---</div>
                </div>
                <div class="action-hint">TAP TO ROTATE</div>
                <div style="position: absolute; bottom: -5px; right: 5px; font-size: 28px; opacity: 0.2; transform: rotate(-15deg);">👣</div>
            </div>
        </div>

        <div class="admin-drawer">
            <div class="section-title">ADD NEW PATTERN</div>
            <div class="input-group">
                <input type="text" id="sName" placeholder="款式..." style="flex:2;">
                <select id="sType" style="flex:1;">
                    <option value="all">四季通用</option><option value="summer">夏季優先</option>
                </select>
                <button class="btn-add" onclick="addSheet()">SAVE</button>
            </div>
        </div>
        <div id="sheetInventory"></div>
    </div>

    <div id="system" class="tab-content">
        <div class="admin-drawer">
            <div class="section-title">BACKUP CODE</div>
            <textarea id="backupCode" rows="3" readonly style="width:100%; border:1px solid var(--border); border-radius:10px; padding:10px; font-size:10px; background:rgba(0,0,0,0.2); color:var(--text-dim); outline:none; border:none;"></textarea>
            <button class="btn-add" style="width:100%; margin-top:12px; justify-content:center;" onclick="copyBackup()">COPY BACKUP</button>
        </div>
        <div class="admin-drawer">
            <div class="section-title">RESTORE DATA</div>
            <textarea id="importInput" rows="3" style="width:100%; border:1px solid var(--border); border-radius:10px; padding:10px; font-size:12px; background:transparent; color:white; outline:none;"></textarea>
            <button class="btn-add" style="width:100%; margin-top:12px; border-color:var(--terracotta); color:var(--terracotta); justify-content:center;" onclick="importData()">RESTORE</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'shift_v7_5_data';
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { basic: [], sheets: [], sheetIdx: 0, currentSheet: "None", sheetLastDate: new Date().toISOString(), coolMode: false };
    let editState = { type: null, idx: null };

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); render(); }

    function render() {
        const now = new Date();
        // Tasks 渲染
        const sortedTasks = data.basic.map((t, i) => {
            const start = new Date(t.lastDate).getTime(), freqMs = (t.freq || 1) * 86400000, end = start + freqMs;
            const progress = Math.min(Math.max(((now.getTime() - start) / freqMs) * 100, 0), 100);
            return { ...t, end: new Date(end), progress, isDue: now.getTime() >= end, i, days: Math.floor((now.getTime() - start) / 86400000) };
        }).sort((a, b) => a.end - b.end);

        document.getElementById('taskList').innerHTML = sortedTasks.map(t => `<div class="item-row">
            <div style="flex:1;" onclick="openModal('task', ${t.i})">
                <div style="font-size:15px; ${t.isDue?'color:var(--terracotta);font-weight:bold':''}">${t.name}</div>
                <div style="font-size:10px; color:var(--text-dim); margin-top:4px;">${t.days} 天前 | 預計 ${t.end.getMonth()+1}/${t.end.getDate()}</div>
            </div>
            <div style="width:100px; height:32px; background:rgba(255,255,255,0.05); border-radius:8px; position:relative; overflow:hidden; border:1px solid var(--border); cursor:pointer;" onclick="doneBasic(${t.i})">
                <div style="position:absolute; height:100%; width:${t.progress}%; background:${t.isDue?'var(--terracotta)':'rgba(159,163,138,0.4)'};"></div>
                <div style="position:absolute; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:900;">DONE</div>
            </div></div>`).join('');

        // Bedding 渲染
        const sStart = new Date(data.sheetLastDate || now).getTime();
        document.getElementById('currentSheetName').innerText = data.currentSheet;
        document.getElementById('sheetDaysInfo').innerText = `${Math.floor((now.getTime() - sStart) / 86400000)} DAYS`;

        let pool = [];
        const sSet = data.sheets.filter(s => s.type === 'summer'), aSet = data.sheets.filter(s => s.type === 'all');
        if (data.coolMode && sSet.length > 0) {
            const m = Math.max(sSet.length, aSet.length);
            for(let i=0; i<m; i++) { if(sSet[i%sSet.length]) pool.push(sSet[i%sSet.length]); if(aSet[i%aSet.length]) pool.push(aSet[i%aSet.length]); }
        } else { pool = aSet.length > 0 ? aSet : data.sheets; }

        let recIdx = data.sheetIdx % (pool.length || 1), recSheet = pool[recIdx] || { name: "EMPTY" };
        if (pool.length > 1 && recSheet.name === data.currentSheet) { recIdx = (recIdx + 1) % pool.length; recSheet = pool[recIdx]; }
        document.getElementById('nextSheetName').innerText = recSheet.name;
        document.getElementById('coolMode').checked = data.coolMode;

        document.getElementById('sheetInventory').innerHTML = data.sheets.map((s, idx) => `
            <div class="item-row">
                <span onclick="openModal('sheet', ${idx})" style="font-size:14px; text-decoration:underline; cursor:pointer;">${s.name} <small style="color:var(--text-dim)">[${s.type==='summer'?'夏':'通'}]</small></span>
                <button class="btn-add" style="padding:4px 8px; border-width:1px;" onclick="setActiveSheet(${idx})">SET</button>
            </div>`).join('');
        document.getElementById('backupCode').value = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    }

    // Modal 與功能函式保持 V7.4 邏輯，但在 CSS 處優化了對齊
    function openModal(type, idx) {
        editState = { type, idx };
        const content = document.getElementById('modalContent');
        if (type === 'task') {
            const t = data.basic[idx];
            content.innerHTML = `<div class="section-title">EDIT TASK</div><input type="text" id="editName" value="${t.name}" class="modal-input"><div class="section-title">FREQUENCY</div><div class="modal-sub-row"><input type="number" id="editVal" value="${t.freq}" style="flex:2;"><select id="editUnit" style="flex:1;"><option value="1">天</option><option value="7">週</option><option value="30">月</option></select></div><div class="modal-btn-row"><button class="modal-btn-main" onclick="confirmEdit()">UPDATE</button><button class="modal-btn-del" onclick="deleteItem()">DEL</button></div><div style="text-align:center; margin-top:25px;"><span onclick="closeModal()" style="font-size:11px; color:var(--text-dim); cursor:pointer;">CANCEL</span></div>`;
        } else {
            const s = data.sheets[idx];
            content.innerHTML = `<div class="section-title">EDIT BEDDING</div><input type="text" id="editName" value="${s.name}" class="modal-input"><div class="section-title">SEASONAL</div><div style="display:flex; gap:10px; margin-bottom:25px;"><button class="btn-add" style="flex:1; ${s.type==='all'?'background:var(--olive);color:var(--bg)':''}" onclick="updateSheetType('all')">四季</button><button class="btn-add" style="flex:1; ${s.type==='summer'?'background:var(--olive);color:var(--bg)':''}" onclick="updateSheetType('summer')">夏季</button></div><div class="modal-btn-row"><button class="modal-btn-main" onclick="confirmEdit()">UPDATE</button><button class="modal-btn-del" onclick="deleteItem()">DEL</button></div><div style="text-align:center; margin-top:25px;"><span onclick="closeModal()" style="font-size:11px; color:var(--text-dim); cursor:pointer;">CANCEL</span></div>`;
        }
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function confirmEdit() {
        const name = document.getElementById('editName').value;
        if(editState.type === 'task') {
            data.basic[editState.idx].name = name;
            data.basic[editState.idx].freq = parseFloat(document.getElementById('editVal').value) * (parseFloat(document.getElementById('editUnit')?.value) || 1);
        } else { data.sheets[editState.idx].name = name; }
        save(); closeModal();
    }
    function updateSheetType(t) { data.sheets[editState.idx].type = t; openModal('sheet', editState.idx); }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function deleteItem() { if(confirm("確定刪除？")) { if(editState.type==='task') data.basic.splice(editState.idx, 1); else data.sheets.splice(editState.idx, 1); save(); closeModal(); } }
    function doneBasic(idx) { data.basic[idx].lastDate = new Date().toISOString(); save(); }
    function addBasic() { const n = document.getElementById('bName').value, v = parseFloat(document.getElementById('bVal').value), u = parseFloat(document.getElementById('bUnit').value); if(n && v) { data.basic.push({ name: n, freq: v * u, lastDate: new Date().toISOString() }); document.getElementById('bName').value=''; save(); } }
    function addSheet() { const n = document.getElementById('sName').value, t = document.getElementById('sType').value; if(n) { data.sheets.push({ name: n, type: t }); document.getElementById('sName').value=''; save(); } }
    function rotateSheet() { const n = document.getElementById('nextSheetName').innerText; if(n!=="EMPTY") { data.currentSheet = n; data.sheetIdx++; data.sheetLastDate = new Date().toISOString(); save(); } }
    function setActiveSheet(idx) { data.currentSheet = data.sheets[idx].name; data.sheetIdx = idx + 1; data.sheetLastDate = new Date().toISOString(); save(); }
    function toggleCooling(e) { data.coolMode = e.target.checked; save(); }
    function tab(id, e) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); e.currentTarget.classList.add('active'); render(); }
    function copyBackup() { document.getElementById('backupCode').select(); document.execCommand('copy'); alert("Copied"); }
    function importData() { try { data = JSON.parse(decodeURIComponent(escape(atob(document.getElementById('importInput').value)))); save(); alert("Success"); } catch(e) { alert("Error"); } }

    setInterval(render, 1000);
    render();
</script>
</body>
</html>
