<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SHIFT_V7.9_CONSISTENCY</title>
    <style>
        :root {
            --bg: #121214; --card: #1c1c1e; --field: #252528;
            --border: rgba(255, 255, 255, 0.1); --text-dim: #8e8e93;
            --text-main: #f2f2f7; --olive: #9fa38a; --terracotta: #b36a5b; 
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; padding: 24px 20px; padding-bottom: 60px; }
        
        /* 導航 */
        .nav { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .nav-btn { background: none; border: none; color: var(--text-dim); font-size: 11px; font-weight: 800; cursor: pointer; padding: 10px 0; }
        .nav-btn.active { color: var(--olive); border-bottom: 2px solid var(--olive); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 床單推薦區：左輕右重 */
        .split-recommend-container { display: flex; height: 160px; gap: 12px; margin-bottom: 24px; }
        .side-card { border-radius: 24px; padding: 18px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        
        .current-side { flex: 1; background: transparent; border: 1.5px solid var(--olive); color: var(--olive); }
        .next-side { flex: 1.4; background: var(--olive); color: var(--bg); cursor: pointer; transition: transform 0.1s; }
        .next-side:active { transform: scale(0.98); }

        .sheet-name-label { font-size: 10px; font-weight: 800; opacity: 0.6; letter-spacing: 1px; }
        .sheet-val { font-size: 20px; font-weight: 700; line-height: 1.2; word-break: break-all; margin-top: 4px; }
        .days-pill { align-self: flex-start; font-size: 9px; font-weight: 900; background: rgba(159, 163, 138, 0.1); padding: 4px 8px; border-radius: 6px; }

        /* 核心：完全一致的編輯框樣式 */
        .admin-drawer { background: var(--field); border-radius: 20px; padding: 18px; margin-bottom: 24px; border: 1px solid var(--border); }
        .section-title { font-size: 10px; font-weight: 800; color: var(--olive); margin-bottom: 15px; letter-spacing: 0.1em; }
        
        /* 統一的 Grid 佈局：名稱 | 參數1 | 參數2 | 按鈕 */
        .input-row { 
            display: grid; 
            grid-template-columns: 2fr 0.8fr 0.7fr auto; 
            gap: 12px; 
            align-items: end; 
        }

        input, select { 
            background: transparent; border: none; border-bottom: 1px solid var(--border); 
            color: var(--text-main); font-size: 14px; outline: none; padding: 8px 0; 
            width: 100%; height: 34px; 
        }
        
        /* 修正文字排列不在一起的問題：統一 line-height 與對齊 */
        select { 
            -webkit-appearance: none; cursor: pointer; color: var(--olive); font-weight: 700; 
            line-height: 1; display: flex; align-items: center;
        }

        .btn-add { 
            background: none; border: 1.5px solid var(--olive); color: var(--olive); 
            height: 32px; padding: 0 12px; border-radius: 10px; font-size: 10px; 
            font-weight: 800; cursor: pointer; white-space: nowrap; 
        }

        /* 列表項目 */
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 5px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="modalOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:100;">
    <div id="modalContent" style="background:var(--card);width:88%;max-width:340px;padding:25px;border-radius:30px;border:1px solid var(--border);"></div>
</div>

<div class="container">
    <div class="nav">
        <button class="nav-btn active" onclick="tab('basic', event)">TASKS</button>
        <button class="nav-btn" onclick="tab('bedding', event)">BEDDING</button>
        <button class="nav-btn" onclick="tab('system', event)">DATA</button>
    </div>

    <div id="basic" class="tab-content active">
        <div class="admin-drawer">
            <div class="section-title">NEW TASK</div>
            <div class="input-row">
                <input type="text" id="bName" placeholder="任務...">
                <input type="number" id="bVal" placeholder="頻率">
                <select id="bUnit">
                    <option value="1">天</option><option value="7">週</option><option value="30">月</option>
                </select>
                <button class="btn-add" onclick="addBasic()">ADD</button>
            </div>
        </div>
        <div id="taskList"></div>
    </div>

    <div id="bedding" class="tab-content">
        <div class="split-recommend-container">
            <div class="side-card current-side">
                <div><div class="sheet-name-label">CURRENT</div><div id="currentSheetName" class="sheet-val">---</div></div>
                <div id="sheetDaysInfo" class="days-pill">0 DAYS</div>
            </div>
            <div class="side-card next-side" onclick="rotateSheet()">
                <div style="position:absolute; top:15px; right:15px; z-index:5;"><input type="checkbox" id="coolMode" onchange="toggleCooling(event)" onclick="event.stopPropagation()"></div>
                <div><div class="sheet-name-label" style="opacity:0.7">NEXT</div><div id="nextSheetName" class="sheet-val">---</div></div>
                <div style="display:flex; justify-content:space-between; align-items:flex-end;"><div style="font-size:9px; font-weight:800; opacity:0.8; letter-spacing:1px;">ROTATE👣</div></div>
            </div>
        </div>

        <div class="admin-drawer">
            <div class="section-title">NEW PATTERN</div>
            <div class="input-row">
                <input type="text" id="sName" placeholder="款式..." style="grid-column: span 1;">
                <div style="grid-column: span 1;"></div> <select id="sType" style="grid-column: span 1;">
                    <option value="all">四季</option><option value="summer">夏季</option>
                </select>
                <button class="btn-add" onclick="addSheet()">ADD</button>
            </div>
        </div>
        <div id="sheetInventory"></div>
    </div>

    <div id="system" class="tab-content">
        <div class="admin-drawer"><div class="section-title">BACKUP</div><textarea id="backupCode" rows="3" readonly style="width:100%; border:none; padding:10px; font-size:10px; background:rgba(0,0,0,0.2); color:var(--text-dim); outline:none; border-radius:10px;"></textarea><button class="btn-add" style="width:100%; margin-top:12px; justify-content:center;" onclick="copyBackup()">COPY</button></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'shift_v7_9_data';
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { basic: [], sheets: [], sheetIdx: 0, currentSheet: "None", sheetLastDate: new Date().toISOString(), coolMode: false };
    
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); render(); }

    function render() {
        const now = new Date();
        const sortedTasks = data.basic.map((t, i) => {
            const start = new Date(t.lastDate).getTime(), freqMs = (t.freq || 1) * 86400000, end = start + freqMs;
            const progress = Math.min(Math.max(((now.getTime() - start) / freqMs) * 100, 0), 100);
            return { ...t, end: new Date(end), progress, isDue: now.getTime() >= end, i, days: Math.floor((now.getTime() - start) / 86400000) };
        }).sort((a, b) => a.end - b.end);

        document.getElementById('taskList').innerHTML = sortedTasks.map(t => `<div class="item-row">
            <div style="flex:1;" onclick="openModal('task', ${t.i})">
                <div style="font-size:15px; ${t.isDue?'color:var(--terracotta);font-weight:bold':''}">${t.name}</div>
                <div style="font-size:10px; color:var(--text-dim); margin-top:4px;">${t.days} 天前 | ${t.end.getMonth()+1}/${t.end.getDate()}</div>
            </div>
            <div style="width:100px; height:32px; background:rgba(255,255,255,0.05); border-radius:8px; position:relative; overflow:hidden; border:1px solid var(--border); cursor:pointer;" onclick="doneBasic(${t.i})">
                <div style="position:absolute; height:100%; width:${t.progress}%; background:${t.isDue?'var(--terracotta)':'rgba(159,163,138,0.4)'};"></div>
                <div style="position:absolute; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:900;">DONE</div>
            </div></div>`).join('');

        const sStart = new Date(data.sheetLastDate || now).getTime();
        document.getElementById('currentSheetName').innerText = data.currentSheet;
        document.getElementById('sheetDaysInfo').innerText = `${Math.floor((now.getTime() - sStart) / 86400000)} DAYS`;

        let pool = [];
        const sSet = data.sheets.filter(s => s.type === 'summer'), aSet = data.sheets.filter(s => s.type === 'all');
        if (data.coolMode && sSet.length > 0) {
            const m = Math.max(sSet.length, aSet.length);
            for(let i=0; i<m; i++) { if(sSet[i%sSet.length]) pool.push(sSet[i%sSet.length]); if(aSet[i%aSet.length]) pool.push(aSet[i%aSet.length]); }
        } else { pool = aSet.length > 0 ? aSet : data.sheets; }

        let recIdx = data.sheetIdx % (pool.length || 1), recSheet = pool[recIdx] || { name: "EMPTY" };
        if (pool.length > 1 && recSheet.name === data.currentSheet) { recIdx = (recIdx + 1) % pool.length; recSheet = pool[recIdx]; }
        document.getElementById('nextSheetName').innerText = recSheet.name;
        document.getElementById('coolMode').checked = data.coolMode;

        document.getElementById('sheetInventory').innerHTML = data.sheets.map((s, idx) => `
            <div class="item-row">
                <span onclick="openModal('sheet', ${idx})" style="font-size:14px; text-decoration:underline; cursor:pointer;">${s.name} <small style="color:var(--text-dim)">[${s.type==='summer'?'夏':'通'}]</small></span>
                <button class="btn-add" style="padding:4px 8px; border-width:1px; height:auto;" onclick="setActiveSheet(${idx})">SET</button>
            </div>`).join('');
        document.getElementById('backupCode').value = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    }

    // Modal, Tab, 與功能邏輯
    function tab(id, e) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); e.currentTarget.classList.add('active'); render(); }
    function addBasic() { const n = document.getElementById('bName').value, v = parseFloat(document.getElementById('bVal').value), u = parseFloat(document.getElementById('bUnit').value); if(n && v) { data.basic.push({ name: n, freq: v * u, lastDate: new Date().toISOString() }); document.getElementById('bName').value=''; save(); } }
    function addSheet() { const n = document.getElementById('sName').value, t = document.getElementById('sType').value; if(n) { data.sheets.push({ name: n, type: t }); document.getElementById('sName').value=''; save(); } }
    function rotateSheet() { const n = document.getElementById('nextSheetName').innerText; if(n!=="EMPTY") { data.currentSheet = n; data.sheetIdx++; data.sheetLastDate = new Date().toISOString(); save(); } }
    function setActiveSheet(idx) { data.currentSheet = data.sheets[idx].name; data.sheetIdx = idx + 1; data.sheetLastDate = new Date().toISOString(); save(); }
    function toggleCooling(e) { data.coolMode = e.target.checked; save(); }
    function doneBasic(idx) { data.basic[idx].lastDate = new Date().toISOString(); save(); }
    function copyBackup() { document.getElementById('backupCode').select(); document.execCommand('copy'); alert("Copied"); }
    
    render();
</script>
</body>
</html>
